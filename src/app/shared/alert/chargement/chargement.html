@if (status == StatusChargement.CHARGEMENT) {
  <div class="d-flex align-items-center  flex-column  justify-content-center">
<div class="spinner-border" role="status">
</div>
  <span class="sr-only">Chargement en cours</span>

  </div>


}
@else if(status == StatusChargement.ERREUR){
 <div class="d-flex align-items-center flex-column justify-content-center">
  <i class="fa-solid fa-x fa-3x text-danger"></i>
  <span class="sr-only">Une erreur est survenue, veuillez réessayer</span>
</div>

}
