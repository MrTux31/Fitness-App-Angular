@if(exercices){

<div class="accordion mt-3">
  <div class="accordion-item">
    <h2 class="accordion-header">
      <button class="accordion-button" type="button" data-bs-toggle="collapse"
        data-bs-target="#exercices" aria-expanded="true">
        Exercices ({{ exercices.length }})
      </button>
    </h2>

    <div id="exercices" class="accordion-collapse collapse show">
      <div class="accordion-body p-0">
        <ul class="list-group list-group-flush">
          @for(exercice of exercices; track exercice.id){
            <li class="list-group-item d-flex justify-content-between">
              <span>
                {{ exercice.name }} <small class="text-muted">(x{{ exercice.repetitions }})</small>
              </span>
              @if(exercice.weight){
                <span class="badge bg-secondary">{{ exercice.weight }} kg</span>
              }
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</div>


}
