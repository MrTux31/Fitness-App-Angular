@if(exercices){

<div class="accordion mt-3">
  <div class="accordion-item">
    <div class="accordion-header">
      <button
        class="accordion-button"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#exercices"
        aria-expanded="true"
      >
        Exercices ({{ exercices.length }})
      </button>
    </div>

    <div id="exercices" class="accordion-collapse collapse show">
      <div class="accordion-body p-0">
        <ul class="list-group list-group-flush">
          @for(exercice of exercices; track exercice.id){
          <li class="list-group-item d-flex justify-content-between">
            <span class="d-flex align-items-center gap-2">
              {{ exercice.name }}
              <small class="text-muted">(x{{ exercice.repetitions }})</small>
              <!--Affichage du poids si nécessaire-->
              @if(exercice.weight){
              <span class="badge bg-secondary d-flex justify-content-center align-items-center"
                >{{ exercice.weight }} kg</span
              >
              }
            </span>

            <div class="d-flex align-items-center gap-2"><!--Bouton d'édition de l'exercice-->
            <a class="btn btn-info" 
              ><i class="fa-solid fa-pen-to-square"></i
            ></a>

            <!--Bouton de suppression de l'exercice-->
            <button class="btn btn-danger">
              <i class="fa-solid fa-trash-can"></i>
            </button></div>
            
          </li>

          }
        </ul>
      </div>
    </div>
  </div>
</div>

}
