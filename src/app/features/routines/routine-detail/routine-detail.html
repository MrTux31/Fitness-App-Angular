
@if(routine() != null && exercices() != null){

<div class="card mb-3" [ngClass]="{
      'border-light': routine()?.status == Status.INACTIVE,
      'border-success': routine()?.status == Status.ACTIVE,
    }">
  <div class="card-header"><h2>{{routine()?.name}}</h2></div>
  <div class="card-body">
    <span
        class="badge mb-2"
        [ngClass]="{
         'bg-light': routine()?.status == Status.INACTIVE,
         'bg-success': routine()?.status == Status.ACTIVE,
        }"
        >{{ routine()?.status | titlecase }}</span
        >
    <p class="card-text">{{routine()?.description}}</p>
  </div>
  <!--Afficher les excercices ici-->
  <app-routine-exercices [exercices]="exercices()!"></app-routine-exercices>
  

</div>

}
