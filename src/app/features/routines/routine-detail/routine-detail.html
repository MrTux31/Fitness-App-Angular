

<a class="btn btn-primary mb-3" routerLink="/routines "
  ><i class="fa-solid fa-arrow-right-from-bracket fa-flip-horizontal"></i> Retour aux routines</a
>

<div
  class="card mb-3"
  [ngClass]="{
      'border-light': routine().status == Status.INACTIVE,
      'border-success': routine().status == Status.ACTIVE,
    }"
>
  <div class="card-header d-flex justify-content-between align-items-center">
    <div class="d-flex justify-content-between align-items-center gap-5">
      <h2>{{ routine().name }}</h2>
      <small>Créée le {{ routine().creationDate }}</small>
    </div>

    <div class="d-flex align-items-center gap-2">
      <!--Bouton pour mettre innactive et pour remettre la routine active-->
      @if (routine().status == Status.ACTIVE) {
      <button  class="btn btn-success" (click)="changeStatusRoutine()"><i class="fa-solid fa-check"></i></button>
      } @else {
      <a class="btn btn-light" (click)="changeStatusRoutine()"><i class="fa-solid fa-rotate-left"></i></a>
      }
      <!--Bouton d'édition de la routine-->
      <a class="btn btn-info" routerLink="/routines/edit/{{ routine().id }}"
        ><i class="fa-solid fa-pen-to-square"></i
      ></a>
      <!--Bouton de suppression de la routine-->
      <button (click)="onSupprime()" class="btn btn-danger">
        <i class="fa-solid fa-trash-can"></i>
      </button>
    </div>
  </div>
  <div class="card-body">
    <span
      class="badge mb-2"
      [ngClass]="{
          'bg-light': routine().status == Status.INACTIVE,
          'bg-success': routine().status == Status.ACTIVE,
        }"
      >{{ routine().status | titlecase }}</span
    >
    <p class="card-text">{{ routine().description }}</p>
  </div>
  <!--Afficher les excercices ici-->
  <app-routine-exercices [exercices]="exercices()"></app-routine-exercices>
</div>

<!--Bouton d'ajout d'un exercice-->
<div class="list-group-item text-center">
  <a routerLink="/routines/{{routine().id}}/add">
  <button class="btn btn-success btn-sm">
    <i class="fa-solid fa-plus"></i> Ajouter un exercice
  </button>
  </a>
</div>
